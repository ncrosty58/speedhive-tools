name: Build and Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt || true
          python -m pip install pytest

      - name: Run tests
        run: |
          pytest -q || true

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Smoke-test built wheel
        shell: bash
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/*.whl
          /tmp/smoke/bin/python -c "from mylaps_client_wrapper import SpeedhiveClient; SpeedhiveClient()"
          /tmp/smoke/bin/python -c "from event_results_client import Client, AuthenticatedClient"
          /tmp/smoke/bin/python -c "import speedhive_tools"
          echo "Smoke test passed — wheel contains all expected packages"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/* --skip-existing
